server:
  port: 7004
  error:
    include-message: always

logging:
  level:
    root: INFO
    com.itservice: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

spring:
  application:
    name: incident-service
  config:
    activate:
      on-profile: default
  datasource:
    url: jdbc:h2:mem:incident-db;DB_CLOSE_DELAY=-1;NON_KEYWORDS=YEAR
    driver-class-name: org.h2.Driver
    username: user
    password: pwd
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        auto-quote-keyword: true
        format_sql: true
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2
      settings:
        web-allow-others: true

microservices:
  customer-service:
    base-url: http://localhost:7001
  staff-service:
    base-url: http://localhost:7002
  asset-service:
    base-url: http://localhost:7003

