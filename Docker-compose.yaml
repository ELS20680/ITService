services:
  # api-gateway will use port 8080
  apigateway:
    build: apigateway
    hostname: apigateway
    container_name: apigateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - customer-service
      - asset-service
      - staff-service
      - incident-service

  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8084:8080"
    environment:
      - API_URL=http://api-gateway:8080/v3/api-docs
    depends_on:
      - apigateway


